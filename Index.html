<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cachorrões do Forró</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background: url('WhatsApp Image 2026-04-22 at 14.51.23.jpeg') no-repeat center center fixed;
    background-size: cover;
    color:#fff;
}

.overlay{
    background: rgba(0,0,0,0.65);
    min-height:100vh;
    width:100%;
    padding:40px 20px;
}

.container{
    max-width:1200px;
    margin:auto;
    text-align:center;
}

h1{
    font-size:55px;
    color:#ffd700;
    margin-bottom:20px;
    text-shadow:2px 2px 8px #000;
}

p{
    font-size:22px;
    margin-bottom:30px;
}

.video-box{
    width:100%;
    max-width:900px;
    margin:auto;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(255,255,255,0.3);
}

iframe{
    width:100%;
    height:500px;
    border:none;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 35px;
    background:#ffd700;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    border-radius:10px;
    transition:0.3s;
}

.btn:hover{
    background:#fff;
    transform:scale(1.05);
}

footer{
    margin-top:40px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="overlay">
    <div class="container">

        <h1>Cachorrões do Forró</h1>
        <p>Arraste o pé e venha dançar com a gente!</p>

        <div class="video-box">
            <!-- COLE AQUI O LINK DO VIDEO DO INSTAGRAM -->
            <iframe src="SEU_LINK_DO_VIDEO_AQUI"></iframe>
        </div>

        <a href="#" class="btn">Contratar Show</a>

        <footer>
            © 2026 Cachorrões do Forró - Todos os direitos reservados
        </footer>

    </div>
</div>

</body>
</html>
