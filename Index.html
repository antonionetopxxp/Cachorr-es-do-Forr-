<!DOCTYPE html>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
    }

    body {
        /* Ajustado para descer a imagem de fundo e não cortar as cabeças */
        background: url('ca.jpg') no-repeat center 25% fixed;
        background-size: cover;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .overlay {
        background: rgba(0,0,0,0.7);
        min-height: 100vh;
        padding-bottom: 50px;
    }

    .menu {
        text-align: center;
        padding: 20px;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(5px);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .menu a {
        color: #fff;
        text-decoration: none;
        margin: 0 10px;
        font-weight: bold;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 15px;
    }

    .box {
        background: rgba(0,0,0,0.8);
        color: #fff;
        padding: 25px;
        border-radius: 20px;
        margin: 20px auto;
        border: 1px solid rgba(255, 159, 67, 0.2);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Layout da foto de perfil menor à esquerda */
    .perfil-header {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .img-perfil {
        width: 100px; /* Foto menor */
        height: 100px;
        object-fit: cover;
        border-radius: 50%;
        border: 3px solid #ff9f43;
    }

    h1 { font-size: 1.4rem; margin: 0; color: #ff9f43; font-weight: 900; }
    h2 { color: #ff9f43; text-transform: uppercase; font-size: 1.1rem; margin-bottom: 20px; letter-spacing: 1px; }

    /* Botão de WhatsApp flutuante */
    .whatsapp-float {
        position: fixed;
        width: 60px;
        height: 60px;
        bottom: 20px;
        right: 20px;
        background-color: #25d366;
        color: #FFF;
        border-radius: 50px;
        text-align: center;
        font-size: 30px;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: 0.3s;
    }
    
    .whatsapp-float:hover {
        transform: scale(1.1);
        background-color: #128c7e;
    }

    /* Botão de contato dentro da box */
    .btn-contato {
        background: #ff9f43;
        color: #000;
        padding: 12px 25px;
        border-radius: 50px;
        text-decoration: none;
        display: inline-block;
        font-weight: bold;
        margin-top: 10px;
        transition: 0.3s;
    }

    .btn-contato:hover {
        background: #fff;
        transform: translateY(-3px);
    }

    iframe {
        border-radius: 10px;
        filter: invert(90%) hue-rotate(180deg); /* Ajusta o calendário para modo escuro */
    }

</style>
</head>

<a href="https://wa.me/5561991561934?text=Olá!+Vi+o+site+e+gostaria+de+um+orçamento+para+show." class="whatsapp-float" target="_blank">

</div>
